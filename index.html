<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Manager</title>
    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ceramic: {
                            50: '#fcfcfc',
                            100: '#f5f5f5',
                            200: '#e5e5e5',
                            300: '#d4d4d4',
                            800: '#262626',
                            900: '#171717',
                        },
                        accent: '#4361ee'
                    },
                    boxShadow: {
                        'swiss': '0 10px 40px -10px rgba(0,0,0,0.06)',
                        'swiss-hover': '0 20px 40px -10px rgba(0,0,0,0.1)'
                    },
                    borderRadius: {
                        'xl': '1rem',
                        '2xl': '1.5rem',
                        '3xl': '2rem'
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Phosphor Icons (for minimalist icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fcfcfc;
            color: #171717;
            -webkit-tap-highlight-color: transparent;
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .glass-nav {
            background: rgba(252, 252, 252, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 获取当前用户信息 (支持开发环境测试，以及从 Telegram 真实读取)
        let TG_USER_ID = "test_user_123";
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) {
            TG_USER_ID = window.Telegram.WebApp.initDataUnsafe.user.id.toString();
        }

        const API_BASE = window.location.origin.includes('localhost') ? 'http://localhost:8000/api' : '/api';

        // --- 组件: 首页 ---
        function Home({ botData }) {
            return (
                <div className="flex flex-col items-center justify-center pt-16 pb-32 px-6 animate-fade-in">
                    <div className="relative mb-8">
                        <div className="w-32 h-32 rounded-[2rem] bg-gradient-to-tr from-ceramic-200 to-white shadow-swiss flex items-center justify-center p-1">
                            <div className="w-full h-full rounded-[1.8rem] overflow-hidden bg-white flex items-center justify-center">
                                {botData?.bot_avatar_url ? (
                                    <img src={botData.bot_avatar_url} alt="Avatar" className="w-full h-full object-cover" />
                                ) : (
                                    <i className="ph ph-robot text-6xl text-ceramic-300"></i>
                                )}
                            </div>
                        </div>
                        <div className="absolute bottom-[-10px] right-[-10px] w-8 h-8 rounded-full bg-white flex items-center justify-center shadow-swiss">
                            <div className="w-4 h-4 rounded-full bg-green-500 animate-pulse"></div>
                        </div>
                    </div>
                    
                    <h1 className="text-2xl font-semibold mb-2 text-ceramic-900 tracking-tight">
                        {botData?.bot_name || 'AI Assistant'}
                    </h1>
                    <p className="text-ceramic-400 text-sm mb-12 flex items-center">
                        <i className="ph ph-plugs-connected mr-2"></i> Online & Ready
                    </p>

                    <div className="w-full max-w-sm rounded-[1.5rem] bg-white shadow-swiss p-5 mb-6 hover:shadow-swiss-hover transition-shadow">
                        <h3 className="text-xs font-semibold text-ceramic-400 uppercase tracking-wider mb-4">SYSTEM STATS</h3>
                        <div className="space-y-4">
                            <div className="flex justify-between items-center">
                                <span className="text-sm font-medium text-ceramic-600 flex items-center"><i className="ph ph-clock mr-2"></i> Buffer Time</span>
                                <span className="text-sm text-ceramic-900">{botData?.buffer_seconds}s</span>
                            </div>
                            <div className="w-full bg-ceramic-100 h-[1px]"></div>
                            <div className="flex justify-between items-center">
                                <span className="text-sm font-medium text-ceramic-600 flex items-center"><i className="ph ph-keyboard mr-2"></i> Typing Speed</span>
                                <span className="text-sm text-ceramic-900">{botData?.typing_speed}s / char</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 组件: 记忆管理 ---
        function Memory() {
            const [items, setItems] = useState([]);
            const [newItem, setNewItem] = useState("");
            const [loading, setLoading] = useState(true);

            const fetchMemories = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${API_BASE}/memory/${TG_USER_ID}`);
                    const data = await res.json();
                    setItems(data.items || []);
                } catch(e) { console.error(e); }
                setLoading(false);
            };

            useEffect(() => { fetchMemories(); }, []);

            const handleAdd = async (e) => {
                e.preventDefault();
                if(!newItem.trim()) return;
                try {
                    await fetch(`${API_BASE}/memory/${TG_USER_ID}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ content: newItem })
                    });
                    setNewItem("");
                    fetchMemories();
                } catch(e) { console.error(e); }
            };

            const handleDelete = async (id) => {
                try {
                    await fetch(`${API_BASE}/memory/${TG_USER_ID}/${id}`, { method: 'DELETE' });
                    fetchMemories();
                } catch(e) { console.error(e); }
            };

            return (
                <div className="pt-8 pb-32 px-6">
                    <h2 className="text-3xl font-bold mb-6 tracking-tight">Memory</h2>
                    
                    <form onSubmit={handleAdd} className="mb-8 relative shadow-swiss rounded-2xl">
                        <input 
                            type="text" 
                            className="w-full bg-white rounded-2xl py-4 pl-5 pr-14 text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 transition-all border border-transparent focus:border-accent/10"
                            placeholder="Add a new memory point..."
                            value={newItem}
                            onChange={(e) => setNewItem(e.target.value)}
                        />
                        <button type="submit" className="absolute right-2 top-2 bottom-2 w-10 bg-ceramic-100 hover:bg-ceramic-200 rounded-xl flex items-center justify-center transition-colors text-ceramic-600">
                            <i className="ph ph-plus-bold"></i>
                        </button>
                    </form>

                    <div className="space-y-4">
                        {loading ? (
                            <div className="text-center text-ceramic-400 py-10"><i className="ph ph-spinner animate-spin text-2xl"></i></div>
                        ) : items.length === 0 ? (
                            <div className="text-center text-ceramic-300 py-10">No memories recorded yet</div>
                        ) : (
                            items.map(item => (
                                <div key={item.id} className="group bg-white rounded-2xl p-5 shadow-swiss flex justify-between items-start transition-all hover:shadow-swiss-hover">
                                    <div className="flex-1 pr-4">
                                        <div className="text-xs text-accent font-medium mb-1">{item.category}</div>
                                        <p className="text-sm text-ceramic-900 leading-relaxed">{item.content}</p>
                                    </div>
                                    <button 
                                        onClick={() => handleDelete(item.id)}
                                        className="w-8 h-8 rounded-full bg-red-50 text-red-400 flex items-center justify-center opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity flex-shrink-0 hover:bg-red-100"
                                    >
                                        <i className="ph ph-trash"></i>
                                    </button>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        // --- 组件: 设置页 ---
        function Settings({ botData, refreshData }) {
            const [formData, setFormData] = useState(botData || {});
            const [saving, setSaving] = useState(false);

            useEffect(() => {
                if(botData) setFormData(botData);
            }, [botData]);

            const handleChange = (field, value) => {
                setFormData({...formData, [field]: value});
            };

            const handleSave = async () => {
                setSaving(true);
                try {
                    await fetch(`${API_BASE}/user/${TG_USER_ID}/settings`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            api_base_url: formData.api_base_url,
                            api_key: formData.api_key,
                            model_name: formData.model_name,
                            system_prompt: formData.system_prompt,
                            world_book: formData.world_book,
                            buffer_seconds: parseInt(formData.buffer_seconds),
                            typing_speed: parseFloat(formData.typing_speed),
                            summarize_threshold: parseInt(formData.summarize_threshold)
                        })
                    });
                    if (window.Telegram?.WebApp) {
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    }
                    refreshData();
                } catch (e) { console.error(e); }
                setSaving(false);
            };

            // 封装的瑞士风输入框
            const InputSetting = ({ label, field, type="text", placeholder }) => (
                <div className="mb-5">
                    <label className="block text-xs font-semibold text-ceramic-400 uppercase tracking-wider mb-2 mb-2 ml-1">{label}</label>
                    <input 
                        type={type} 
                        className="w-full bg-white rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 transition-all border border-ceramic-100/50 shadow-sm"
                        value={formData[field] || ''} 
                        placeholder={placeholder}
                        onChange={(e) => handleChange(field, e.target.value)}
                    />
                </div>
            );

            // 封装的文本域
            const TextareaSetting = ({ label, field, placeholder, rows=3 }) => (
                <div className="mb-5">
                    <label className="block text-xs font-semibold text-ceramic-400 uppercase tracking-wider mb-2 ml-1">{label}</label>
                    <textarea 
                        rows={rows}
                        className="w-full bg-white rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 transition-all border border-ceramic-100/50 shadow-sm resize-none"
                        value={formData[field] || ''} 
                        placeholder={placeholder}
                        onChange={(e) => handleChange(field, e.target.value)}
                    ></textarea>
                </div>
            );

            return (
                <div className="pt-8 pb-32 px-6">
                    <h2 className="text-3xl font-bold mb-6 tracking-tight">Configuration</h2>
                    
                    <div className="bg-white rounded-[2rem] p-6 shadow-swiss mb-6">
                        <InputSetting label="API Base URL" field="api_base_url" placeholder="https://api.openai.com/v1" />
                        <InputSetting label="API Key" field="api_key" type="password" placeholder="sk-..." />
                        <InputSetting label="Model Name" field="model_name" placeholder="gpt-4o" />
                    </div>

                    <div className="bg-white rounded-[2rem] p-6 shadow-swiss mb-6">
                        <TextareaSetting label="System Prompt (人格)" field="system_prompt" rows={4} placeholder="You are a helpful assistant..." />
                        <TextareaSetting label="World Book (背景/世界观)" field="world_book" rows={4} placeholder="Background settings..." />
                    </div>

                    <div className="bg-white rounded-[2rem] p-6 shadow-swiss mb-6">
                        <div className="grid grid-cols-2 gap-4">
                            <InputSetting label="Buffer (sec)" field="buffer_seconds" type="number" />
                            <InputSetting label="Typing/char (sec)" field="typing_speed" type="number" />
                        </div>
                    </div>

                    <button 
                        onClick={handleSave} 
                        disabled={saving}
                        className="w-full bg-ceramic-900 text-white font-medium text-sm py-4 rounded-2xl shadow-lg hover:bg-ceramic-800 transition-colors flex items-center justify-center mb-8"
                    >
                        {saving ? <i className="ph ph-spinner animate-spin"></i> : "Save Settings"}
                    </button>
                </div>
            );
        }

        // --- 主 App 组件 ---
        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [botData, setBotData] = useState(null);

            const fetchUser = async () => {
                try {
                    const res = await fetch(`${API_BASE}/user/${TG_USER_ID}`);
                    const data = await res.json();
                    setBotData(data);
                } catch(e) { console.error(e); }
            };

            useEffect(() => {
                fetchUser();
                // Telegram WebApp 初始化
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.expand();
                    window.Telegram.WebApp.ready();
                    // iOS 安全区补偿
                    document.body.style.backgroundColor = 'var(--tg-theme-bg-color, #fcfcfc)';
                }
            }, []);

            const NavItem = ({ id, icon, label }) => {
                const isActive = activeTab === id;
                return (
                    <button 
                        onClick={() => setActiveTab(id)}
                        className={`flex flex-col items-center justify-center w-full h-full transition-colors ${isActive ? 'text-accent' : 'text-ceramic-400'}`}
                    >
                        <i className={`ph ${isActive ? 'ph-'+icon+'-fill' : 'ph-'+icon} text-2xl mb-1`}></i>
                        <span className="text-[10px] font-medium">{label}</span>
                    </button>
                )
            };

            return (
                <div className="min-h-screen bg-ceramic-50 overflow-x-hidden relative max-w-md mx-auto shadow-2xl">
                    <div className="h-full overflow-y-auto no-scrollbar">
                        {activeTab === 'home' && <Home botData={botData} />}
                        {activeTab === 'memory' && <Memory />}
                        {activeTab === 'settings' && <Settings botData={botData} refreshData={fetchUser} />}
                    </div>

                    {/* 底部导航栏(瑞士极简风格) */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-[88px] glass-nav border-t border-ceramic-200/30 supports-[backdrop-filter]:bg-white/60 pb-safe">
                        <div className="flex h-[60px] items-center justify-around px-2">
                            <NavItem id="home" icon="house" label="Home" />
                            <NavItem id="memory" icon="brain" label="Memory" />
                            <NavItem id="settings" icon="gearSix" label="Settings" />
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
