<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 管理后台</title>
    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ceramic: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            800: '#1e293b',
                            900: '#0f172a',
                        },
                        accent: '#3b82f6'
                    },
                    boxShadow: {
                        'swiss': '0 10px 40px -10px rgba(0,0,0,0.05)',
                        'swiss-hover': '0 20px 40px -10px rgba(0,0,0,0.08)'
                    },
                    borderRadius: {
                        'xl': '1rem',
                        '2xl': '1.5rem',
                        '3xl': '2rem'
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Phosphor Icons (for minimalist icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            -webkit-tap-highlight-color: transparent;
            background-image: radial-gradient(at 0% 0%, hsla(210, 100%, 97%, 1) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, hsla(210, 50%, 95%, 1) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 获取当前用户信息
        let TG_USER_ID = "test_user_123";
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) {
            TG_USER_ID = window.Telegram.WebApp.initDataUnsafe.user.id.toString();
        }

        // 生产环境下（比如挂在 GitHub Pages 上），这里的 API_BASE 需要指向你跑着 FastAPI 的公网地址
        // 例如 'https://your-ngrok-domain.ngrok.io/api'，如果在本地调试，则用 localhost
        const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        
        // 🚨非常重要：请要求用户如果部署在 GitHub Pages，必须在这里写死他的后端穿透地址！
        const PRODUCTION_API_URL = 'https://myatgb.zeabur.app/api'; // <--- 这里填入你的 Zeabur 公网地址
        
        const API_BASE = isLocalhost ? 'http://localhost:8000/api' : PRODUCTION_API_URL;

        // ============================== 首页 ==============================
        function Home({ botData }) {
            return (
                <div className="flex flex-col items-center justify-center pt-20 pb-32 px-6 animate-fade-in">
                    <div className="relative mb-8">
                        <div className="w-32 h-32 rounded-[2rem] bg-gradient-to-tr from-ceramic-200 to-white shadow-swiss flex items-center justify-center p-1">
                            <div className="w-full h-full rounded-[1.8rem] overflow-hidden bg-white flex items-center justify-center">
                                {botData?.bot_avatar_url ? (
                                    <img src={botData.bot_avatar_url} alt="Avatar" className="w-full h-full object-cover" />
                                ) : (
                                    <i className="ph ph-robot text-6xl text-ceramic-300"></i>
                                )}
                            </div>
                        </div>
                        <div className="absolute bottom-[-10px] right-[-10px] w-8 h-8 rounded-full bg-white flex items-center justify-center shadow-swiss">
                            <div className="w-4 h-4 rounded-full bg-green-500 animate-pulse"></div>
                        </div>
                    </div>
                    
                    <h1 className="text-2xl font-semibold mb-2 text-ceramic-900 tracking-tight">
                        {botData?.bot_name || 'AI 守护者'}
                    </h1>
                    <p className={`text-sm mb-12 flex items-center ${botData ? 'text-green-500' : 'text-red-500 animate-pulse'}`}>
                        <i className="ph ph-plugs-connected mr-2"></i> 
                        {botData ? '核心连接通畅：已准备就绪' : '连接后端断开，请检查电脑是否开启服务...'}
                    </p>

                    <div className="w-full max-w-sm rounded-[1.5rem] glass-card shadow-swiss p-5 mb-6 hover:shadow-swiss-hover transition-shadow">
                        <h3 className="text-xs font-semibold text-ceramic-400 uppercase tracking-wider mb-4">系统健康度与指标</h3>
                        <div className="space-y-4">
                            <div className="flex justify-between items-center">
                                <span className="text-sm font-medium text-ceramic-600 flex items-center"><i className="ph ph-clock mr-2"></i> 消息缓冲窗口</span>
                                <span className="text-sm text-ceramic-900 font-medium">{botData?.buffer_seconds} 秒</span>
                            </div>
                            <div className="w-full bg-ceramic-100/50 h-[1px]"></div>
                            <div className="flex justify-between items-center">
                                <span className="text-sm font-medium text-ceramic-600 flex items-center"><i className="ph ph-keyboard mr-2"></i> 模拟打字间隔</span>
                                <span className="text-sm text-ceramic-900 font-medium">{botData?.typing_speed} 秒/字符</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ============================== 记忆管理 ==============================
        function Memory() {
            const [items, setItems] = useState([]);
            const [newItem, setNewItem] = useState("");
            const [loading, setLoading] = useState(true);

            const fetchMemories = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${API_BASE}/memory/${TG_USER_ID}`, {
                        headers: { 'Bypass-Tunnel-Reminder': 'true' }
                    });
                    const data = await res.json();
                    setItems(data.items || []);
                } catch(e) { console.error(e); }
                setLoading(false);
            };

            useEffect(() => { fetchMemories(); }, []);

            const handleAdd = async (e) => {
                e.preventDefault();
                if(!newItem.trim()) return;
                try {
                    await fetch(`${API_BASE}/memory/${TG_USER_ID}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Bypass-Tunnel-Reminder': 'true'
                        },
                        body: JSON.stringify({ content: newItem })
                    });
                    setNewItem("");
                    fetchMemories();
                } catch(e) { console.error(e); }
            };

            const handleDelete = async (id) => {
                try {
                    await fetch(`${API_BASE}/memory/${TG_USER_ID}/${id}`, { 
                        method: 'DELETE',
                        headers: { 'Bypass-Tunnel-Reminder': 'true' }
                    });
                    fetchMemories();
                } catch(e) { console.error(e); }
            };

            return (
                <div className="pt-10 pb-32 px-6">
                    <h2 className="text-3xl font-bold mb-6 tracking-tight">核心记忆</h2>
                    
                    <form onSubmit={handleAdd} className="mb-8 relative shadow-swiss rounded-2xl group">
                        <input 
                            type="text" 
                            className="w-full glass-card rounded-2xl py-4 pl-5 pr-14 text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 transition-all border border-transparent focus:border-accent/10"
                            placeholder="手动铭刻一个记忆点..."
                            value={newItem}
                            onChange={(e) => setNewItem(e.target.value)}
                        />
                        <button type="submit" className="absolute right-2 top-2 bottom-2 w-10 bg-ceramic-100 hover:bg-ceramic-200 rounded-xl flex items-center justify-center transition-colors text-ceramic-600">
                            <i className="ph ph-plus-bold"></i>
                        </button>
                    </form>

                    <div className="space-y-4">
                        {loading ? (
                            <div className="text-center text-ceramic-400 py-10"><i className="ph ph-spinner animate-spin text-2xl"></i></div>
                        ) : items.length === 0 ? (
                            <div className="text-center text-ceramic-400 py-10 text-sm">暂无离散记忆，多和我聊聊吧</div>
                        ) : (
                            items.map(item => (
                                <div key={item.id} className="group glass-card rounded-2xl p-5 shadow-swiss flex justify-between items-start transition-all hover:shadow-swiss-hover">
                                    <div className="flex-1 pr-4">
                                        <div className="text-xs text-accent font-medium mb-1 drop-shadow-sm">{item.category}</div>
                                        <p className="text-sm text-ceramic-900 leading-relaxed font-medium">{item.content}</p>
                                    </div>
                                    <button 
                                        onClick={() => handleDelete(item.id)}
                                        className="w-8 h-8 rounded-full bg-red-50 text-red-500 flex items-center justify-center opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity flex-shrink-0 hover:bg-red-100 shadow-sm"
                                    >
                                        <i className="ph ph-trash"></i>
                                    </button>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        // ============================== 设置页 ==============================
        function Settings({ botData, refreshData }) {
            const [formData, setFormData] = useState(botData || {});
            const [saving, setSaving] = useState(false);
            const [models, setModels] = useState([]);
            const [fetchingModels, setFetchingModels] = useState(false);
            const [modelError, setModelError] = useState("");

            useEffect(() => {
                if(botData) {
                    setFormData(botData);
                    // 初始加载已有配置的话，且模型没列表时拉取
                    if(botData.api_base_url && botData.api_key && models.length === 0) {
                        fetchModelsList(botData.api_base_url, botData.api_key);
                    }
                }
            }, [botData]);

            // 拉取模型列表（既然你的大模型接口支持跨域，这里我们就直接让浏览器去原地址拉取，省掉一层麻烦！）
            const fetchModelsList = async (url, key) => {
                if(!url || !key) return;
                setFetchingModels(true);
                setModelError("");
                try {
                    let baseUrlTrimmed = url.trim();
                    if (baseUrlTrimmed.endsWith('/')) baseUrlTrimmed = baseUrlTrimmed.slice(0, -1);
                    if (baseUrlTrimmed.endsWith('/chat/completions')) baseUrlTrimmed = baseUrlTrimmed.replace('/chat/completions', '');
                    
                    let modelsUrl = baseUrlTrimmed;
                    if (!baseUrlTrimmed.endsWith('/v1') && !baseUrlTrimmed.includes('v1')) {
                        modelsUrl = `${baseUrlTrimmed}/v1/models`;
                    } else {
                        modelsUrl = `${baseUrlTrimmed}/models`;
                    }

                    const res = await fetch(modelsUrl, {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${key}`
                        }
                    });
                    
                    if (!res.ok) {
                        throw new Error(`HTTP ${res.status}`);
                    }
                    
                    const data = await res.json();
                    if (data && data.data && Array.isArray(data.data)) {
                        const modelsIds = data.data.map(m => m.id).filter(id => id);
                        modelsIds.sort();
                        setModels(modelsIds);
                        // 如果当前没选模型而拉到了，自动设为第一个
                        if(!formData.model_name && modelsIds.length > 0) {
                            setFormData(prev => ({...prev, model_name: modelsIds[0]}));
                        }
                    } else {
                        setModelError("数据格式不是标准的模型数组");
                    }
                } catch(e) { 
                    setModelError("浏览器直接请求被拒绝或网络失败(可能是跨域拦截)");
                    console.error(e);
                }
                setFetchingModels(false);
            };

            const handleChange = (field, value) => {
                setFormData({...formData, [field]: value});
            };

            const handleSave = async () => {
                if (!formData.api_base_url || !formData.api_key) {
                    if (window.Telegram?.WebApp?.showAlert) window.Telegram.WebApp.showAlert("请先填写大模型 API URL 和 API Key！");
                    else alert("请先填写大模型 API URL 和 API Key！");
                    return;
                }
                setSaving(true);
                try {
                    const res = await fetch(`${API_BASE}/user/${TG_USER_ID}/settings`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Bypass-Tunnel-Reminder': 'true'
                        },
                        body: JSON.stringify({
                            api_base_url: formData.api_base_url,
                            api_key: formData.api_key,
                            model_name: formData.model_name || '',
                            system_prompt: formData.system_prompt || '',
                            world_book: formData.world_book || '',
                            buffer_seconds: parseInt(formData.buffer_seconds) || 10,
                            typing_speed: parseFloat(formData.typing_speed) || 0.5,
                            summarize_threshold: parseInt(formData.summarize_threshold) || 10,
                            max_context_count: parseInt(formData.max_context_count) || 15
                        })
                    });
                    
                    if (!res.ok) throw new Error("保存失败，后端可能断开连接");
                    
                    if (window.Telegram?.WebApp) {
                        try {
                            window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                            window.Telegram.WebApp.showAlert('核心配置注入成功！');
                        } catch(e) {}
                    } else {
                        alert("核心配置注入成功！");
                    }
                    
                    await refreshData();
                } catch (e) {
                    console.error(e);
                    if (window.Telegram?.WebApp?.showAlert) window.Telegram.WebApp.showAlert(`存储异常: ${e.message}。请检查后端状态。`);
                    else alert(`存储异常: ${e.message}。请检查后端状态。`);
                }
                setSaving(false);
            };

            const InputSetting = ({ label, field, type="text", placeholder, onBlur }) => (
                <div className="mb-5">
                    <label className="block text-[11px] font-semibold text-ceramic-400 uppercase tracking-wider mb-2 ml-1">{label}</label>
                    <input 
                        type={type} 
                        className="w-full bg-white/60 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 transition-all border border-ceramic-200 shadow-sm"
                        value={formData[field] || ''} 
                        placeholder={placeholder}
                        onChange={(e) => handleChange(field, e.target.value)}
                        onBlur={onBlur}
                    />
                </div>
            );

            const TextareaSetting = ({ label, field, placeholder, rows=3 }) => (
                <div className="mb-5">
                    <label className="block text-[11px] font-semibold text-ceramic-400 uppercase tracking-wider mb-2 ml-1">{label}</label>
                    <textarea 
                        rows={rows}
                        className="w-full bg-white/60 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 transition-all border border-ceramic-200 shadow-sm resize-none"
                        value={formData[field] || ''} 
                        placeholder={placeholder}
                        onChange={(e) => handleChange(field, e.target.value)}
                    ></textarea>
                </div>
            );

            return (
                <div className="pt-10 pb-32 px-6">
                    <h2 className="text-3xl font-bold mb-6 tracking-tight">偏好配置</h2>
                    
                    {/* API 配置卡片 */}
                    <div className="glass-card rounded-[2rem] p-6 shadow-swiss mb-6 relative">
                        <div className="flex justify-between items-end mb-2">
                             <span className="text-sm font-bold text-ceramic-900 border-b-2 border-accent pb-1">底层驱动端点</span>
                        </div>
                        <div className="mt-4">
                            <InputSetting 
                                label="兼容 OpenAPI 格式的转发地址" 
                                field="api_base_url" 
                                placeholder="https://api.openai.com/v1" 
                                onBlur={() => fetchModelsList(formData.api_base_url, formData.api_key)}
                            />
                            <InputSetting 
                                label="代理令牌 (API Key)" 
                                field="api_key" 
                                type="password" 
                                placeholder="sk-..." 
                                onBlur={() => fetchModelsList(formData.api_base_url, formData.api_key)}
                            />
                            
                            <div className="mb-2">
                                <label className="block text-[11px] font-semibold text-ceramic-400 uppercase tracking-wider mb-2 ml-1 flex justify-between">
                                    <span>目标计算模型</span>
                                    {fetchingModels && <span className="text-accent animate-pulse">正在拉取...</span>}
                                </label>
                                <div className="flex gap-2">
                                    <div className="relative w-full">
                                        <select 
                                            className="w-full appearance-none bg-white/60 rounded-2xl pl-4 pr-10 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-accent/20 transition-all border border-ceramic-200 shadow-sm"
                                            value={formData.model_name || ''}
                                            onChange={(e) => handleChange("model_name", e.target.value)}
                                        >
                                            {models.length === 0 && <option value={formData.model_name || ''}>{formData.model_name || '暂无可用列表'}</option>}
                                            {models.map(m => <option key={m} value={m}>{m}</option>)}
                                        </select>
                                        <div className="absolute inset-y-0 right-3 flex items-center pointer-events-none text-ceramic-400">
                                            <i className="ph ph-caret-down"></i>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => fetchModelsList(formData.api_base_url, formData.api_key)}
                                        className="bg-ceramic-100 hover:bg-ceramic-200 text-ceramic-600 px-4 rounded-xl flex items-center justify-center transition-colors shadow-sm"
                                        title="重新拉取模型"
                                    >
                                        <i className="ph ph-arrows-clockwise text-lg"></i>
                                    </button>
                                </div>
                                {modelError && <p className="text-xs text-red-500 mt-2 ml-1">{modelError}</p>}
                            </div>
                        </div>
                    </div>

                    {/* 角色与背景设定 */}
                    <div className="glass-card rounded-[2rem] p-6 shadow-swiss mb-6">
                        <div className="flex justify-between items-end mb-4">
                             <span className="text-sm font-bold text-ceramic-900 border-b-2 border-accent pb-1">灵魂铸造阵</span>
                        </div>
                        <TextareaSetting label="System Prompt (潜台词人格)" field="system_prompt" rows={4} placeholder="你是一个傲娇的女仆..." />
                        <TextareaSetting label="World Book (世界观刻印)" field="world_book" rows={4} placeholder="当前世界的背景法则..." />
                    </div>

                    {/* 高级物理规则 */}
                    <div className="glass-card rounded-[2rem] p-6 shadow-swiss mb-6">
                       <div className="flex justify-between items-end mb-4">
                             <span className="text-sm font-bold text-ceramic-900 border-b-2 border-accent pb-1">感官与时间参数</span>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <InputSetting label="缓冲感知 (秒)" field="buffer_seconds" type="number" />
                            <InputSetting label="打字速度/字" field="typing_speed" type="number" />
                        </div>
                        <div className="mt-4 mb-2">
                            <label className="block text-[11px] font-semibold text-ceramic-400 uppercase tracking-wider mb-2 ml-1 flex justify-between">
                                <span>上下文携带量 ({formData.max_context_count || 15} 条)</span>
                                <span className="text-accent font-bold">建议 10-20</span>
                            </label>
                            <input 
                                type="range" 
                                min="1" 
                                max="50" 
                                step="1"
                                className="w-full accent-accent h-2 bg-ceramic-200 rounded-lg appearance-none cursor-pointer"
                                value={formData.max_context_count || 15}
                                onChange={(e) => handleChange("max_context_count", parseInt(e.target.value))}
                            />
                            <div className="flex justify-between mt-1 px-1">
                                <span className="text-[10px] text-ceramic-400">极省 (1条)</span>
                                <span className="text-[10px] text-ceramic-400">大记忆 (50条)</span>
                            </div>
                        </div>
                        <InputSetting label="触发记忆总结条数阈值" field="summarize_threshold" type="number" />
                        
                        <div className="mt-6 pt-6 border-t border-ceramic-100">
                             <button 
                                onClick={handleClearHistory}
                                className="w-full bg-red-50/50 hover:bg-red-50 text-red-500 py-3 rounded-2xl text-sm font-bold transition-all border border-red-100 shadow-sm flex items-center justify-center gap-2"
                             >
                                <i className="ph ph-trash-simple text-lg"></i>
                                重置当前对话记忆
                             </button>
                             <p className="text-[10px] text-ceramic-400 mt-2 text-center px-4">该操作将永久删除此账号与 AI 最近的对话明细，但不会影响核心记忆点。</p>
                        </div>
                    </div>

                    <button 
                        onClick={handleSave} 
                        disabled={saving}
                        className="w-full bg-ceramic-900 text-white font-medium text-sm py-4 rounded-2xl shadow-lg hover:bg-ceramic-800 transition-colors flex items-center justify-center mb-10 action-button"
                    >
                        {saving ? <i className="ph ph-spinner animate-spin text-lg"></i> : (
                            <>
                                <i className="ph ph-floppy-disk text-lg mr-2"></i> 保存并注入核心
                            </>
                        )}
                    </button>
                </div>
            );
        }

        // ============================== 主 App ==============================
        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [botData, setBotData] = useState(null);

            const fetchUser = async () => {
                try {
                    const res = await fetch(`${API_BASE}/user/${TG_USER_ID}`, {
                        headers: { 'Bypass-Tunnel-Reminder': 'true' }
                    });
                    const data = await res.json();
                    setBotData(data);
                } catch(e) { console.error(e); }
            };

            useEffect(() => {
                fetchUser();
                // Telegram WebApp 初始化
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.expand();
                    window.Telegram.WebApp.ready();
                    // iOS 安全区与背景色接轨
                    document.body.style.backgroundColor = 'var(--tg-theme-bg-color, #f8fafc)';
                    window.Telegram.WebApp.setHeaderColor('secondary_bg_color');
                }
            }, []);

            const NavItem = ({ id, icon, label }) => {
                const isActive = activeTab === id;
                return (
                    <button 
                        onClick={() => setActiveTab(id)}
                        className={`flex flex-col items-center justify-center w-full h-full transition-colors relative ${isActive ? 'text-accent' : 'text-ceramic-400'}`}
                    >
                        {isActive && <div className="absolute top-1 w-1/2 h-1 bg-accent rounded-full mb-1"></div>}
                        <i className={`ph ${isActive ? 'ph-'+icon+'-fill' : 'ph-'+icon} text-2xl mb-1 ${isActive ? 'mt-2' : ''}`}></i>
                        <span className="text-[10px] font-semibold">{label}</span>
                    </button>
                )
            };

            return (
                <div className="min-h-screen relative max-w-md mx-auto shadow-2xl bg-transparent">
                    <div className="h-full overflow-y-auto no-scrollbar">
                        {activeTab === 'home' && <Home botData={botData} />}
                        {activeTab === 'memory' && <Memory />}
                        {activeTab === 'settings' && <Settings botData={botData} refreshData={fetchUser} />}
                    </div>

                    {/* 底部悬浮毛玻璃导航 */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-[90px] glass-nav border-t border-white/50 pb-safe z-50 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.03)]">
                        <div className="flex h-[64px] items-center justify-around px-2 relative top-2">
                            <NavItem id="home" icon="rocket-launch" label="大盘" />
                            <NavItem id="memory" icon="brain" label="记忆片段" />
                            <NavItem id="settings" icon="faders-horizontal" label="参数调整" />
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
